<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Converter | Atharv Pathak</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="assets/favicon.png" type="image/x-icon">
  </head>
  <body>
    <header><div>Currency Converter</div></header>

    <main>
      <div class="container">
        <form>
          <div class="amount">
            <label id="label-amount" for="amount">Enter Amount</label>
            <input
              type="number"
              min="0"
              step="any"
              id="amount"
              placeholder="---"
            />
          </div>

          <div class="dropdown">
            <div class="from">
              <label id="label-from" for="from">From</label>
              <img src="https://flagsapi.com/US/flat/64.png" alt="" />
              <select id="from">
                <!-- <option value="USD" selected>USD</option>
                <option value="INR">INR</option>
                <option value="EUR">EUR</option>
                <option value="AED">AED</option> -->
              </select>
            </div>
            <img src="assets/exchange.png" alt="exchange" class="exchange" />
            <div class="to">
              <label id="label-to" for="to">To</label>
              <img src="https://flagsapi.com/IN/flat/64.png" alt="" />
              <select id="to">
                <!-- <option value="USD">USD</option>
                <option value="INR" selected>INR</option>
                <option value="EUR">EUR</option>
                <option value="AED">AED</option> -->
              </select>
            </div>
          </div>
          <!-- <button>Get Exchange Rate</button> -->

          <div class="exchangerate">
            <div class="er1">-</div>
            <div class="eq">=</div>
            <div class="er2">-</div>
          </div>
          <div class="result">
            <div class="r1 hidden">-</div>
            <img
              src="assets/exchange.png"
              alt="exchange"
              class="exchange2 hidden"
            />
            <div class="r2 hidden">-</div>
          </div>
        </form>
      </div>
    </main>

    <footer>
      <div class="left">
        <p>
          Made with
          <a href="https://flagsapi.com/">FlagsAPI</a>
          &
          <a href="https://github.com/fawazahmed0/exchange-api">Exchange-API</a>
          by <a href="https://github.com/fawazahmed0">fawazahmed0</a>
        </p>
      </div>
    </footer>

    <script src="codes.js"></script>
    <script src="script.js"></script>
  </body>
</html>
